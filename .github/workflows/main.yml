name: Build V.L.A.D. APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências do Sistema Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libbz2-dev libsqlite3-dev lldb lld zip unzip

      - name: Instalar Buildozer e Cython
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 virtualenv buildozer

      - name: Compilar APK com o Buildozer
        run: |
          # O comando 'yes' aceita automaticamente os termos de licença do Android SDK
          yes | buildozer android debug

      - name: Guardar o APK Pronto (Upload)
        uses: actions/upload-artifact@v4
        with:
          name: VLAD-AI-APK
          path: bin/*.apk
